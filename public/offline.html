<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a1a">
  <title>You're offline — {BUSINESS_NAME}</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#0a0a1a;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;align-items:center;justify-content:center;padding:1.5rem}
    main{max-width:30rem;text-align:center}
    .badge{display:inline-block;padding:.25rem .75rem;border:1px solid rgba(100,255,218,.3);border-radius:9999px;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:#64ffda;margin-bottom:1.5rem}
    h1{font-size:clamp(1.75rem,4vw,2.5rem);margin:0 0 .75rem;font-weight:700;letter-spacing:-.02em}
    p{color:rgba(255,255,255,.72);line-height:1.6;margin:0 0 2rem}
    button{appearance:none;border:0;background:#64ffda;color:#0a0a1a;font:inherit;font-weight:600;padding:.875rem 1.75rem;border-radius:.5rem;cursor:pointer;transition:transform .1s ease,box-shadow .2s ease}
    button:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(100,255,218,.25)}
    button:active{transform:translateY(0) scale(.98)}
    small{display:block;margin-top:2rem;color:rgba(255,255,255,.4);font-size:.75rem}
  </style>
</head>
<body>
  <main>
    <span class="badge">Offline</span>
    <h1>You're offline</h1>
    <p>We can't reach the network right now. Check your connection — your work is safe and we'll reconnect as soon as you're back online.</p>
    <button type="button" onclick="location.reload()">Try again</button>
    <small id="last-loaded"></small>
  </main>
  <script>
    document.getElementById('last-loaded').textContent = 'Last viewed: ' + new Date().toLocaleString();
  </script>
</body>
</html>
